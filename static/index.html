<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能文档助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f4f5f7;--sidebar:#1b1f2e;--sidebar-light:#252a3a;
  --primary:#4f46e5;--primary-hover:#4338ca;--primary-light:#eef2ff;
  --text:#1f2937;--text-light:#6b7280;--text-white:#f9fafb;
  --border:#e5e7eb;--card:#fff;--danger:#ef4444;--success:#10b981;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}

/* ---------- Layout ---------- */
#app{display:flex;height:100vh;overflow:hidden}

/* ---------- Sidebar ---------- */
.sidebar{
  width:300px;min-width:300px;background:var(--sidebar);color:var(--text-white);
  display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06);
}
.sidebar-header{padding:20px 20px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header h2{font-size:15px;font-weight:600;letter-spacing:.3px;opacity:.9}

.upload-section{padding:16px}
.drop-zone{
  border:2px dashed rgba(255,255,255,.18);border-radius:var(--radius);
  padding:28px 16px;text-align:center;cursor:pointer;transition:all .25s;
  background:rgba(255,255,255,.03);
}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--primary);background:rgba(79,70,229,.1)}
.drop-zone-icon{font-size:32px;margin-bottom:8px;opacity:.7}
.drop-zone p{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6}
.drop-zone .link{color:var(--primary);cursor:pointer;text-decoration:underline}
.drop-zone input[type=file]{display:none}

.pending-files{padding:0 16px;max-height:120px;overflow-y:auto}
.pending-file{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;margin-bottom:4px;border-radius:6px;
  background:rgba(255,255,255,.06);font-size:12px;
}
.pending-file .remove{cursor:pointer;opacity:.5;transition:opacity .15s}
.pending-file .remove:hover{opacity:1;color:var(--danger)}

.upload-actions{padding:8px 16px 0}
.btn-upload{
  width:100%;padding:10px;border:none;border-radius:8px;
  background:var(--primary);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .2s;
}
.btn-upload:hover{background:var(--primary-hover)}
.btn-upload:disabled{opacity:.4;cursor:not-allowed}

.divider{height:1px;background:rgba(255,255,255,.08);margin:16px 0}

.doc-section{flex:1;overflow-y:auto;padding:0 16px 16px}
.doc-section h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;opacity:.45;margin-bottom:10px}
.doc-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:8px;margin-bottom:4px;
  background:rgba(255,255,255,.05);font-size:13px;transition:background .15s;
}
.doc-item:hover{background:rgba(255,255,255,.1)}
.doc-meta{display:flex;flex-direction:column;min-width:0}
.doc-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.doc-chunks{font-size:11px;opacity:.45;margin-top:2px}
.doc-del{
  background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
  font-size:16px;padding:4px 6px;border-radius:4px;transition:all .15s;flex-shrink:0;
}
.doc-del:hover{color:var(--danger);background:rgba(239,68,68,.15)}
.doc-empty{font-size:12px;opacity:.35;text-align:center;padding:20px 0}

/* ---------- Main Chat Area ---------- */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}

.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;border-bottom:1px solid var(--border);background:var(--card);
}
.chat-header h1{font-size:17px;font-weight:700}
.btn-settings{
  display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);
  border-radius:8px;background:var(--card);cursor:pointer;font-size:13px;
  color:var(--text-light);transition:all .2s;
}
.btn-settings:hover{border-color:var(--primary);color:var(--primary)}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.messages::-webkit-scrollbar{width:6px}
.messages::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

.welcome{text-align:center;margin:auto;max-width:480px;padding:40px 20px}
.welcome h2{font-size:22px;margin-bottom:12px;font-weight:700}
.welcome p{color:var(--text-light);line-height:1.7;font-size:14px}

.msg{display:flex;gap:12px;max-width:800px;width:100%;margin:0 auto}
.msg.user{flex-direction:row-reverse}
.msg-avatar{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0;
}
.msg.user .msg-avatar{background:var(--primary);color:#fff}
.msg.assistant .msg-avatar{background:#e0e7ff;color:var(--primary)}
.msg-bubble{
  padding:12px 16px;border-radius:14px;line-height:1.7;font-size:14px;
  max-width:calc(100% - 50px);overflow-wrap:break-word;
}
.msg.user .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}

.msg-bubble p{margin-bottom:8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble pre{background:#f3f4f6;border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:13px}
.msg-bubble code{font-family:'Fira Code',monospace;font-size:13px}
.msg-bubble :not(pre)>code{background:#f3f4f6;padding:2px 5px;border-radius:4px}
.msg-bubble ul,.msg-bubble ol{margin:8px 0;padding-left:20px}
.msg-bubble table{border-collapse:collapse;width:100%;margin:8px 0}
.msg-bubble th,.msg-bubble td{border:1px solid var(--border);padding:6px 10px;font-size:13px}
.msg-bubble th{background:#f9fafb;font-weight:600}
.msg-bubble hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.msg-bubble a{color:var(--primary)}

.typing-dot{display:inline-block;width:6px;height:6px;background:var(--text-light);border-radius:50%;animation:blink 1.4s infinite;margin-right:3px}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s;margin-right:0}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Input */
.input-section{padding:0 24px 20px}
.input-wrap{
  display:flex;align-items:flex-end;gap:10px;max-width:800px;margin:0 auto;
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:8px 8px 8px 16px;transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--primary)}
.input-wrap textarea{
  flex:1;border:none;outline:none;resize:none;font-size:14px;line-height:1.5;
  font-family:inherit;max-height:120px;padding:4px 0;background:transparent;
}
.btn-send{
  padding:8px 18px;border:none;border-radius:10px;background:var(--primary);
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;
  white-space:nowrap;
}
.btn-send:hover{background:var(--primary-hover)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;
  align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--card);border-radius:16px;width:480px;max-width:92vw;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-light);padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.form-group input,.form-group select{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;transition:border-color .2s;outline:none;
}
.form-group input:focus{border-color:var(--primary)}
.form-group .hint{font-size:11px;color:var(--text-light);margin-top:4px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.btn-save{
  padding:10px 24px;border:none;border-radius:8px;background:var(--primary);
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;
}
.btn-save:hover{background:var(--primary-hover)}

/* ---------- Toast ---------- */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;
  color:#fff;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ---------- Responsive ---------- */
@media(max-width:768px){
  .sidebar{width:260px;min-width:260px}
}
@media(max-width:640px){
  .sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:50;transition:left .3s}
  .sidebar.open{left:0}
}

/* upload progress overlay */
.upload-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;
  align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(4px);
}
.upload-overlay.active{display:flex}
.upload-progress{
  background:var(--card);border-radius:16px;padding:32px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.upload-progress .spinner{
  width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-progress p{font-size:14px;color:var(--text-light)}
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2>📁 文档管理</h2></div>
    <div class="upload-section">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept=".md">
        <div class="drop-zone-icon">📄</div>
        <p>拖拽 Markdown 文件到此处<br>或 <span class="link" id="browseLink">点击选择文件</span></p>
      </div>
    </div>
    <div class="pending-files" id="pendingFiles"></div>
    <div class="upload-actions">
      <button class="btn-upload" id="uploadBtn" disabled>提交并生成向量索引</button>
    </div>
    <div class="divider"></div>
    <div class="doc-section">
      <h3>已索引文档</h3>
      <div id="docList"><div class="doc-empty">暂无文档</div></div>
    </div>
  </aside>

  <!-- Chat -->
  <main class="chat-area">
    <header class="chat-header">
      <h1>💬 智能文档助手</h1>
      <button class="btn-settings" id="settingsBtn">⚙️ 模型配置</button>
    </header>
    <div class="messages" id="messages">
      <div class="welcome">
        <h2>👋 欢迎使用智能文档助手</h2>
        <p>上传公司内部 Markdown 文档，系统会自动建立向量索引。<br>之后你可以随时提问，我会根据文档内容为你提供准确的回答。</p>
      </div>
    </div>
    <div class="input-section">
      <div class="input-wrap">
        <textarea id="questionInput" placeholder="输入你的问题…" rows="1"></textarea>
        <button class="btn-send" id="sendBtn">发送</button>
      </div>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <h2>模型配置</h2>
      <button class="modal-close" id="closeSettings">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="cfgApiKey" placeholder="sk-your-api-key">
        <div class="hint" id="cfgApiKeyHint"></div>
      </div>
      <div class="form-group">
        <label>API Base URL</label>
        <input type="text" id="cfgBaseUrl" placeholder="https://dashscope.aliyuncs.com/compatible-mode/v1">
        <div class="hint">支持任何 OpenAI 兼容的 API 地址（DashScope、OpenAI、本地 Ollama 等）</div>
      </div>
      <div class="form-group">
        <label>LLM 模型名称</label>
        <input type="text" id="cfgModel" placeholder="qwen-plus">
        <div class="hint">例如: qwen-plus, qwen-turbo, qwen-max, gpt-4o</div>
      </div>
      <div class="form-group">
        <label>Embedding 模型名称</label>
        <input type="text" id="cfgEmbModel" placeholder="text-embedding-v3">
      </div>
      <div class="form-group">
        <label>Temperature</label>
        <input type="number" id="cfgTemp" min="0" max="2" step="0.1" value="0.7">
      </div>
      <div class="form-group">
        <label>检索数量 (Top K)</label>
        <input type="number" id="cfgTopK" min="1" max="20" value="5">
        <div class="hint">每次检索返回的最相关文档片段数量</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-save" id="saveSettings">保存配置</button>
    </div>
  </div>
</div>

<!-- Upload Overlay -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-progress">
    <div class="spinner"></div>
    <p id="uploadStatus">正在处理文档并生成向量索引…</p>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
marked.setOptions({
  highlight(code, lang) {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, {language: lang}).value;
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
});

/* ============================================================
   State
   ============================================================ */
let pendingFiles = [];
let chatHistory = [];
let isStreaming = false;

/* ============================================================
   DOM refs
   ============================================================ */
const $=s=>document.querySelector(s);
const dropZone     = $('#dropZone');
const fileInput    = $('#fileInput');
const browseLink   = $('#browseLink');
const pendingDiv   = $('#pendingFiles');
const uploadBtn    = $('#uploadBtn');
const docList      = $('#docList');
const messagesDiv  = $('#messages');
const questionInput= $('#questionInput');
const sendBtn      = $('#sendBtn');
const settingsBtn  = $('#settingsBtn');
const settingsModal= $('#settingsModal');
const closeSettings= $('#closeSettings');
const saveSettingsBtn=$('#saveSettings');
const uploadOverlay= $('#uploadOverlay');
const uploadStatus = $('#uploadStatus');

/* ============================================================
   Toast
   ============================================================ */
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('#toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ============================================================
   File upload handling
   ============================================================ */
browseLink.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(fileList) {
  for (const f of fileList) {
    if (!f.name.endsWith('.md')) { toast(`${f.name} 不是 .md 文件，已跳过`, 'error'); continue; }
    if (pendingFiles.some(p => p.name === f.name)) continue;
    pendingFiles.push(f);
  }
  renderPending();
}

function renderPending() {
  pendingDiv.innerHTML = pendingFiles.map((f, i) =>
    `<div class="pending-file"><span>📄 ${f.name}</span><span class="remove" data-i="${i}">&times;</span></div>`
  ).join('');
  pendingDiv.querySelectorAll('.remove').forEach(el =>
    el.addEventListener('click', () => { pendingFiles.splice(+el.dataset.i, 1); renderPending(); })
  );
  uploadBtn.disabled = pendingFiles.length === 0;
}

uploadBtn.addEventListener('click', async () => {
  if (!pendingFiles.length) return;
  uploadOverlay.classList.add('active');
  uploadStatus.textContent = '正在处理文档并生成向量索引…';

  const form = new FormData();
  pendingFiles.forEach(f => form.append('files', f));

  try {
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    if (!res.ok) {
      const text = await res.text();
      throw new Error(`服务器错误 (${res.status}): ${text.slice(0, 200)}`);
    }
    const data = await res.json();
    let ok = 0, fail = 0;
    data.results.forEach(r => {
      if (r.status === 'success') ok++;
      else { fail++; if (r.error) toast(`${r.filename}: ${r.error}`, 'error'); }
    });
    if (ok) toast(`成功索引 ${ok} 个文档`, 'success');
    if (fail && !data.results.some(r => r.error)) toast(`${fail} 个文档处理失败`, 'error');
    pendingFiles = [];
    renderPending();
    loadDocuments();
  } catch (e) {
    toast('上传失败: ' + e.message, 'error');
  } finally {
    uploadOverlay.classList.remove('active');
  }
});

/* ============================================================
   Document list
   ============================================================ */
async function loadDocuments() {
  try {
    const res = await fetch('/api/documents');
    const data = await res.json();
    if (!data.documents.length) {
      docList.innerHTML = '<div class="doc-empty">暂无文档</div>';
      return;
    }
    docList.innerHTML = data.documents.map(d =>
      `<div class="doc-item">
        <div class="doc-meta">
          <span class="doc-name" title="${d.filename}">📄 ${d.filename}</span>
          <span class="doc-chunks">${d.chunks} 个片段</span>
        </div>
        <button class="doc-del" data-name="${d.filename}" title="删除">&times;</button>
      </div>`
    ).join('');
    docList.querySelectorAll('.doc-del').forEach(el =>
      el.addEventListener('click', async () => {
        if (!confirm(`确定删除 ${el.dataset.name}？`)) return;
        await fetch(`/api/documents/${encodeURIComponent(el.dataset.name)}`, { method: 'DELETE' });
        toast('已删除', 'info');
        loadDocuments();
      })
    );
  } catch { /* silent */ }
}
loadDocuments();

/* ============================================================
   Chat
   ============================================================ */
function addMessage(role, content) {
  const welcome = messagesDiv.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '👤' : '🤖';
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble"></div>`;
  messagesDiv.appendChild(div);

  const bubble = div.querySelector('.msg-bubble');
  if (content) {
    bubble.innerHTML = role === 'user' ? escapeHtml(content) : marked.parse(content);
  }
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return bubble;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showTyping(bubble) {
  bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
}

async function sendMessage() {
  const q = questionInput.value.trim();
  if (!q || isStreaming) return;

  isStreaming = true;
  sendBtn.disabled = true;
  questionInput.value = '';
  questionInput.style.height = 'auto';

  addMessage('user', q);
  const bubble = addMessage('assistant', '');
  showTyping(bubble);

  let full = '';
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: q, history: chatHistory }),
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {value, done} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') continue;
        try {
          const obj = JSON.parse(payload);
          if (obj.error) { full += `\n\n**错误:** ${obj.error}`; break; }
          if (obj.content) full += obj.content;
        } catch {}
      }
      bubble.innerHTML = marked.parse(full);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  } catch (e) {
    full = `连接错误: ${e.message}`;
  }

  bubble.innerHTML = marked.parse(full || '（无响应）');
  bubble.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  chatHistory.push({role: 'user', content: q});
  chatHistory.push({role: 'assistant', content: full});
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  isStreaming = false;
  sendBtn.disabled = false;
  questionInput.focus();
}

sendBtn.addEventListener('click', sendMessage);
questionInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
questionInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

/* ============================================================
   Settings
   ============================================================ */
settingsBtn.addEventListener('click', () => { loadSettings(); settingsModal.classList.add('open'); });
closeSettings.addEventListener('click', () => settingsModal.classList.remove('open'));
settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.remove('open'); });

async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    const s = await res.json();
    $('#cfgApiKey').value = '';
    $('#cfgApiKeyHint').textContent = s.llm_api_key_display ? `当前: ${s.llm_api_key_display}` : '未设置';
    $('#cfgBaseUrl').value = s.llm_base_url || '';
    $('#cfgModel').value = s.llm_model || '';
    $('#cfgEmbModel').value = s.embedding_model || '';
    $('#cfgTemp').value = s.temperature ?? 0.7;
    $('#cfgTopK').value = s.top_k ?? 5;
  } catch { /* silent */ }
}

saveSettingsBtn.addEventListener('click', async () => {
  const body = {};
  const apiKey = $('#cfgApiKey').value.trim();
  if (apiKey) body.llm_api_key = apiKey;
  const baseUrl = $('#cfgBaseUrl').value.trim();
  if (baseUrl) body.llm_base_url = baseUrl;
  const model = $('#cfgModel').value.trim();
  if (model) body.llm_model = model;
  const embModel = $('#cfgEmbModel').value.trim();
  if (embModel) body.embedding_model = embModel;
  const temp = parseFloat($('#cfgTemp').value);
  if (!isNaN(temp)) body.temperature = temp;
  const topK = parseInt($('#cfgTopK').value);
  if (!isNaN(topK)) body.top_k = topK;

  try {
    await fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    toast('配置已保存', 'success');
    settingsModal.classList.remove('open');
  } catch (e) {
    toast('保存失败: ' + e.message, 'error');
  }
});
</script>
</body>
</html>
